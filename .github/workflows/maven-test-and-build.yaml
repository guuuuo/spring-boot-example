name: "Maven: Test & Build"

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
    inputs:
      skipTest:
        description: "Skip unit and integration tests (maps to -Dmaven.test.skip)"
        type: boolean
        required: false
        default: false

permissions:
  contents: read

env:
  JAVA_VERSION: "25"   # 全局变量，统一管理 JDK 版本

jobs:
  test:
    name: "Run tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout backend repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Show Maven version
        run: mvn --version

      - name: "Test: Unit & Integration"
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.skipTest == 'true') }}
        run: mvn clean test

  build:
    name: "Build package"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout backend repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Show Maven version
        run: mvn --version

      - name: Build
        run: mvn package -Dmaven.test.skip=true
