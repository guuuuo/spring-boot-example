name: "Maven: Test & Build"

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
    inputs:
      # 原有 boolean 参数
      skipTest:
        description: "Skip unit and integration tests (maps to -Dmaven.test.skip)"
        type: boolean
        required: false
        default: false
      runLearningJob:
        description: "Run the learning/demo job"
        type: boolean
        required: false
        default: true
      runLearningStep:
        description: "Run a specific step inside the learning job"
        type: boolean
        required: false
        default: true
      
      # 新增：string 类型
      customString:
        description: "A custom string input for demonstration"
        type: string
        required: false
        default: "default-value"
      
      # 新增：choice 类型（下拉选项）
      environmentChoice:
        description: "Choose an environment (demo for choice type)"
        type: choice
        required: false
        default: "dev"
        options:
          - dev
          - staging
          - production
      
      # 新增：number 类型
      retryCount:
        description: "Number of retries (demo for number type)"
        type: number
        required: false
        default: 3
      
      # 新增：environment 类型（需要仓库中预先定义 environment）
      deployEnv:
        description: "Select GitHub Environment (must be pre-configured in repo)"
        type: environment
        required: false

permissions:
  contents: read

env:
  JAVA_VERSION: "25"

jobs:
  test:
    name: "Run tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout backend repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Show Maven version
        run: mvn --version

      - name: "Test: Unit & Integration"
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.skipTest == 'true') }}
        run: mvn clean test

  build:
    name: "Build package"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout backend repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Show Maven version
        run: mvn --version

      - name: Build
        run: mvn package -Dmaven.test.skip=true

  learning:
    name: "Learning: Test GitHub Actions features"
    runs-on: ubuntu-latest
    if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.runLearningJob == 'false') }}
    steps:
      - name: Step 1 - Print event name
        run: echo "Event name is ${{ github.event_name }}"

      - name: Step 2 - Print runner OS
        run: echo "Running on ${{ runner.os }}"

      - name: Step 3 - Show GitHub context
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"
          echo "SHA: ${{ github.sha }}"

      - name: Step 4 - Print all input parameter values (demo of string, choice, number, environment)
        run: |
          echo "=== workflow_dispatch input values ==="
          echo "skipTest: ${{ github.event.inputs.skipTest }}"
          echo "runLearningJob: ${{ github.event.inputs.runLearningJob }}"
          echo "runLearningStep: ${{ github.event.inputs.runLearningStep }}"
          echo "customString: ${{ github.event.inputs.customString }}"
          echo "environmentChoice: ${{ github.event.inputs.environmentChoice }}"
          echo "retryCount: ${{ github.event.inputs.retryCount }}"
          echo "deployEnv: ${{ github.event.inputs.deployEnv }}"
          echo "===================================="

      - name: Step 5 - Conditional logic based on string input
        if: ${{ github.event.inputs.customString == 'special' }}
        run: |
          echo "Custom string is 'special'! This step runs only when customString equals 'special'."

      - name: Step 6 - Conditional logic based on choice input
        if: ${{ github.event.inputs.environmentChoice == 'production' }}
        run: |
          echo "Environment choice is 'production' - you might want to be extra careful."

      - name: Step 7 - Using number input in logic (compare > 5)
        if: ${{ github.event.inputs.retryCount > 5 }}
        run: |
          echo "Retry count is greater than 5 (currently ${{ github.event.inputs.retryCount }})."

      - name: Step 8 - Show environment input (if provided)
        if: ${{ github.event.inputs.deployEnv != '' }}
        run: |
          echo "Deployment environment selected: ${{ github.event.inputs.deployEnv }}"

      - name: Step 9 - Controlled by boolean runLearningStep
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.runLearningStep == 'false') }}
        run: |
          echo "This step is controlled by 'runLearningStep' boolean input."
          echo "It runs by default, and can be disabled by unchecking that box."

      - name: Step 10 - Always run (no condition)
        run: echo "This step always runs if the learning job is executed."
